services:
  postgres:
    image: postgres:16-alpine
    container_name: caaampaign-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caaampaign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caaampaign_secret}
      POSTGRES_DB: ${POSTGRES_DB:-caaampaign_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
